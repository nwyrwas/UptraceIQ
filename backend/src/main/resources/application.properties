spring.application.name=uptraceiq-backend

# Connects to an in-memory H2 database named "uptraceiq"
apring.datasource.url=jdbc:h2:mem:uptraceiq 

# Tells Spring which Java class handles the connection
spring.datasource.driver-class-name=org.h2.Driver

# Tells JPA to generate H2-compatible SQL
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Gives us a web UI at localhost:8080/h2-console to browse the database
spring.h2.console.enabled=true